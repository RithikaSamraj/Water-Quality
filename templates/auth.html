{% extends "base.html" %} 
{% block body_class %}auth-bg{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 75vh;">
    <div class="col-md-5">
        <div class="glass-panel text-center shadow-lg animate__animated animate__zoomIn">
            <h2 class="mb-4" style="font-weight: 700; background: -webkit-linear-gradient(45deg, #0f172a, #0088cc); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Access Portal</h2>
            <p class="text-muted mb-4">Secure authentication for water quality analytics</p>

            <ul class="nav nav-tabs nav-tabs-glass justify-content-center mb-4" id="authTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab">Login</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab">Register</button>
                </li>
            </ul>

            <div class="tab-content text-start" id="authTabsContent">
                <!-- Login Form -->
                <div class="tab-pane fade show active" id="login" role="tabpanel">
                    <form method="POST" action="{{ url_for('auth.login') }}">
                        <div class="mb-4">
                            <label for="email" class="form-label">Email address</label>
                            <input type="email" class="form-control form-control-glass" id="email" name="email" placeholder="name@company.com" required />
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control form-control-glass" id="password" name="password" placeholder="••••••••" required />
                        </div>
                        <button type="submit" name="login" class="btn btn-glass w-100 mt-2">Sign In</button>
                    </form>
                </div>

                <!-- Register Form -->
                <div class="tab-pane fade" id="register" role="tabpanel">
                    <form method="POST" action="{{ url_for('auth.register') }}">
                        <div class="mb-3">
                            <label for="reg_username" class="form-label">Username</label>
                            <input type="text" class="form-control form-control-glass" id="reg_username" name="username" placeholder="johndoe" required />
                        </div>
                        <div class="mb-3">
                            <label for="reg_email" class="form-label">Email address</label>
                            <input type="email" class="form-control form-control-glass" id="reg_email" name="email" placeholder="name@company.com" required />
                        </div>
                        <div class="mb-4">
                            <label for="reg_password" class="form-label">Password</label>
                            <input type="password" class="form-control form-control-glass" id="reg_password" name="password" placeholder="••••••••" required />
                        </div>
                        <button type="submit" class="btn btn-glass btn-glass-success w-100 mt-2">Create Account</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
